name: Welcome Team Member
on:
  workflow_dispatch

jobs:
  welcome: # Job 이름을 welcome으로 수정
    runs-on: ubuntu-latest
    steps:
      - name: 환영 인사 시작
        run: echo "=== 환영합니다! ==="

      - name: 프로젝트 정보 안내
        run: |
          echo "오늘은 당신의 첫 출근일입니다"
          echo "프로젝트: GitHub Actions 학습"
          echo "팀: DevOps"
          echo "Runner OS: $RUNNER_OS" # 실제 실행 중인 OS 정보 출력 (Linux)

      - name: 마무리 인사
        run: echo "=== 행운을 빕니다! ==="
